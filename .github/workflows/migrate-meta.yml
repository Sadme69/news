name: Migrate Meta secret
on: workflow_dispatch
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - run: pip install pynacl requests
      - env:
          META: ${{ secrets.META_ACCESS_TOKEN }}
          PAT: ${{ secrets.NEW_REPO_PAT }}
        shell: python
        run: |
          import base64, os, requests
          from nacl import encoding, public
          H = {"Authorization": "Bearer " + os.environ["PAT"], "Accept": "application/vnd.github+json"}
          REPO = "ahad-hossin/Sandesh"
          key = requests.get("https://api.github.com/repos/" + REPO + "/actions/secrets/public-key", headers=H, timeout=30).json()
          pk = public.PublicKey(key["key"].encode(), encoding.Base64Encoder())
          sealed = public.SealedBox(pk).encrypt(os.environ["META"].encode())
          r = requests.put("https://api.github.com/repos/" + REPO + "/actions/secrets/META_ACCESS_TOKEN", headers=H,
                           json={"encrypted_value": base64.b64encode(sealed).decode(), "key_id": key["key_id"]}, timeout=30)
          print("META_ACCESS_TOKEN ->", r.status_code)
          assert r.status_code in (201, 204)
